name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install WikiBrain
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run unit and contract tests
        run: python -m unittest discover -s tests -v

      - name: Run the real Wikimap contract
        env:
          WIKIMAP_BIN: wikimap
        run: python -m unittest tests.test_real_wikimap -v

      - name: Check bytecode and dependencies
        run: |
          python -m compileall -q src tests scripts
          python -m pip check

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install WikiBrain
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run unit and contract tests
        run: python -m unittest discover -s tests -v

      - name: Run the real Wikimap contract
        shell: pwsh
        run: |
          $env:WIKIMAP_BIN = (Get-Command wikimap.exe).Source
          python -m unittest tests.test_real_wikimap -v

      - name: Test the native Windows installer
        shell: pwsh
        run: |
          ./scripts/install-windows.ps1 `
            -PackageSource $PWD `
            -Initialize `
            -SkipPythonInstall

      - name: Verify native Windows hooks
        shell: pwsh
        run: |
          $pipxBin = (
            py -3 -m pipx environment --value PIPX_BIN_DIR
          ).Trim()
          $brainctl = Join-Path $pipxBin "brainctl.exe"
          & $brainctl --version
          & $brainctl doctor --json
          if ($LASTEXITCODE -ne 0) {
            throw "brainctl doctor failed"
          }

          $brainHome = Join-Path $env:LOCALAPPDATA "WikiBrain"
          $config = Get-Content (
            Join-Path $brainHome "config.json"
          ) -Raw | ConvertFrom-Json
          if ($config.workspace_roots.Count -ne 1) {
            throw "Unexpected workspace root count"
          }
          if (
            [IO.Path]::GetFullPath($config.workspace_roots[0]).TrimEnd("\") -ine
            [IO.Path]::GetFullPath($env:USERPROFILE).TrimEnd("\")
          ) {
            throw "The default workspace is not the Windows user profile"
          }

          $shim = Join-Path $brainHome "bin\wikibrain-hook.ps1"
          if (-not (Test-Path -LiteralPath $shim)) {
            throw "The PowerShell hook shim is missing"
          }
          $claude = Get-Content (
            Join-Path $env:USERPROFILE ".claude\settings.json"
          ) -Raw | ConvertFrom-Json
          $codex = Get-Content (
            Join-Path $env:USERPROFILE ".codex\hooks.json"
          ) -Raw | ConvertFrom-Json
          if ($claude.hooks.SessionStart[0].hooks[0].command -ne "powershell.exe") {
            throw "Claude is not using the PowerShell exec-form hook"
          }
          if (-not $codex.hooks.SessionStart[0].hooks[0].commandWindows) {
            throw "Codex commandWindows is missing"
          }

          $payload = @{
            session_id = "windows-ci"
            cwd = $env:USERPROFILE
            hook_event_name = "SessionStart"
            source = "startup"
          } | ConvertTo-Json -Compress
          $result = $payload | powershell.exe -NoLogo -NoProfile `
            -NonInteractive -ExecutionPolicy Bypass -File $shim `
            hook --provider codex
          $result | ConvertFrom-Json | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "The Windows hook shim failed"
          }

      - name: Check bytecode and dependencies
        run: |
          python -m compileall -q src tests scripts
          python -m pip check
